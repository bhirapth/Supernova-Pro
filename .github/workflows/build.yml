name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version from tags
        id: latest_version
        run: |
          VERSION=$(git tag -l "v*" --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $VERSION"

      - name: Calculate next version
        id: next_version
        run: |
          VERSION="${{ steps.latest_version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -ge 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          if [ "$MINOR" -ge 10 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: v$NEW_VERSION"

      - name: Update gradle.properties
        run: |
          sed -i "s/^mod_version = .*/mod_version = ${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find artifact
        id: find-artifact
        run: |
          ARTIFACT=$(find build/libs -name "*.jar" -not -name "*sources*" | head -1)
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supernova-${{ steps.next_version.outputs.version }}
          path: ${{ steps.find-artifact.outputs.artifact }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: release v${{ steps.next_version.outputs.version }}" || true
          git tag -a "v${{ steps.next_version.outputs.version }}" -m "v${{ steps.next_version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.next_version.outputs.version }}"
          name: "v${{ steps.next_version.outputs.version }}"
          files: ${{ steps.find-artifact.outputs.artifact }}
          generate_release_notes: true
