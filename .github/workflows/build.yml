name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get last version tag
        id: last_version
        run: |
          LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "Last version: $LAST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LAST_TAG="${{ steps.last_version.outputs.tag }}"
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION"

      - name: Update version in gradle.properties
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.version }}"
          sed -i "s/^mod_version = .*/mod_version = $NEW_VERSION/" gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find artifact
        id: find-artifact
        run: |
          ARTIFACT=$(find build/libs -name "*.jar" -not -name "*sources*" | head -1)
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "Found artifact: $ARTIFACT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alien-${{ steps.next_version.outputs.version }}
          path: ${{ steps.find-artifact.outputs.artifact }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.next_version.outputs.version }}" || echo "No changes to commit"

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.next_version.outputs.version }}" -m "Release v${{ steps.next_version.outputs.version }}"
          git push origin "v${{ steps.next_version.outputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.next_version.outputs.version }}"
          name: "v${{ steps.next_version.outputs.version }}"
          files: ${{ steps.find-artifact.outputs.artifact }}
          generate_release_notes: true
          draft: false
          prerelease: false
